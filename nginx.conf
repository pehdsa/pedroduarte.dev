server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    # HTML: never trust the cache, always revalidate so new deploys show up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS: short TTL + revalidation so deploys without filename hashing
    # propagate quickly (304 Not Modified is cheap).
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Images, fonts, icons: these are renamed when changed — safe to freeze.
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|avif|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
