services:
  pedroduarte-dev:
    image: nginx:alpine
    container_name: pedroduarte-dev
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./images:/usr/share/nginx/html/images
      - ./robots.txt:/usr/share/nginx/html/robots.txt
      - ./sitemap.xml:/usr/share/nginx/html/sitemap.xml
      - ./site.webmanifest:/usr/share/nginx/html/site.webmanifest
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
